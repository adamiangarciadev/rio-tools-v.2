<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión disciplinaria - Depósito</title>
  <link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="../../assets/rio-theme.css" />
</head>
<body>
  <div class="app">
    <header class="topbar module-topbar">
      <a class="btn ghost" href="../../index.html">← Volver</a>
      <div class="module-topbar__title">
        <h1>Gestión disciplinaria</h1>
        <p>Consulta de remitos y generación de documento</p>
      </div>
          <div class="module-topbar__spacer"></div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Buscar remito</h2>

        <div class="form-row">
          <label for="remito">N° de remito</label>
          <div class="search-group">
            <input type="text" id="remito" placeholder="Ej: 2993" />
            <button id="btnBuscar">Buscar</button>
          </div>
        </div>

        <div id="estado" class="estado oculto"></div>

        <div class="form-grid">
          <div class="form-row">
            <label for="responsable">Responsable</label>
            <input type="text" id="responsable" readonly />
          </div>

          <div class="form-row">
            <label for="origen">Origen</label>
            <input type="text" id="origen" readonly />
          </div>

          <div class="form-row">
            <label for="destino">Destino</label>
            <input type="text" id="destino" readonly />
          </div>

          <div class="form-row">
            <label for="fecha">Fecha</label>
            <input type="text" id="fecha" readonly />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Datos del documento</h2>

        <div class="form-grid">
          <div class="form-row">
            <label for="tipoDocumento">Tipo de documento</label>
            <select id="tipoDocumento">
              <option value="APERCIBIMIENTO">APERCIBIMIENTO</option>
              <option value="SUSPENSION">SUSPENSIÓN</option>
            </select>
          </div>

          <div class="form-row">
            <label for="empleado">Empleado</label>
            <input type="text" id="empleado" placeholder="Nombre del empleado" />
          </div>

          <div class="form-row">
            <label for="dni">DNI</label>
            <input type="text" id="dni" placeholder="Ej: 29408268" />
          </div>

          <div class="form-row">
            <label for="sector">Sector</label>
            <input type="text" id="sector" value="Depósito" />
          </div>

          <div class="form-row">
            <label for="difNegativas">Diferencias negativas</label>
            <input type="number" id="difNegativas" min="0" placeholder="Ej: 15" />
            </div>

            <div class="form-row">
            <label for="difPositivas">Diferencias positivas</label>
            <input type="number" id="difPositivas" min="0" placeholder="Ej: 3" />
          </div>

          <div class="form-row">
            <label for="fechaDocumento">Fecha del documento</label>
            <input type="date" id="fechaDocumento" />
          </div>
        </div>

        <div class="form-row">
          <label for="motivo">Motivo</label>
          <textarea id="motivo" rows="3">reiterados errores en el proceso de picking</textarea>
        </div>

        <div class="form-row">
          <label for="observacion">Observación adicional</label>
          <textarea id="observacion" rows="4" placeholder="Detalle adicional opcional"></textarea>
        </div>

        <div class="acciones">
          <button id="btnVistaPrevia" class="secondary">Vista previa</button>
          <button id="btnPdf">Descargar PDF</button>
          <button id="btnLimpiar" class="danger">Limpiar</button>
        </div>
      </section>

      <section class="card preview-card">
        <h2>Vista previa</h2>
        <div id="preview" class="preview"></div>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="../../assets/rio-access.js" data-require-supervision="true"></script>
  <script src="app.js"></script>
</body>
</html>
